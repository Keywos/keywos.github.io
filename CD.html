<!doctype html>
<html>
    <head>
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta charset="utf-8">
        <title>Keycd</title>
    </head>
        <style>
            body {
                    margin: 0;
                    width: 100%;
                    height: 100vh;
                    background: linear-gradient(-45deg, #e73c6d,#ee7752, #23d579, #23d579, #23d579, #23b4d5, #e73c6d,#e73c6d,#e036a7,#ee7752);
                    background-size: 1000% 1000%;
                    animation: gradientBG 15s ease infinite;
                    font: 16px/1.8 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC","Microsoft YaHei", Helvetica, Arial, sans-serif,"Apple Color Emoji", "Segoe UI Emoji";
                    /* text-align: center; */
                    background-color: rgb(0, 0, 0);
                }
                
                @keyframes gradientBG {
                    0% {
                        background-position: 0% 50%;
                    }
                    50% {
                        background-position: 100% 50%;
                    }
                    100% {
                        background-position: 0% 50%;
                    }
                }
        </style>

</html>
