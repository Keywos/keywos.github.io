<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Keycd</title>
    </head>
        <style>
            body {
                    margin: 0;
                    width: 100%;
                    height: 100vh;
                    /* font-family: "Exo", sans-serif; */
                    /* color: #fff; */
                    background: linear-gradient(-45deg,#23d579, #23d579,#23d579,#23d579,#ee7752,#ee7752, #ee7752, #e73c6d, #e73c7e, #e036a7, #23b4d5, #23b4d5, #23d5ab, #23d579, #23d579,#23d579,#23d579);
                    background-size: 400% 400%;
                    animation: gradientBG 15s ease infinite;
                    font: 16px/1.8 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC","Microsoft YaHei", Helvetica, Arial, sans-serif,"Apple Color Emoji", "Segoe UI Emoji";
                    /* text-align: center; */
                    background-color: rgba(0, 0, 0, 0);
                }
                
                @keyframes gradientBG {
                    0% {
                        background-position: 0% 50%;
                    }
                    50% {
                        background-position: 100% 50%;
                    }
                    100% {
                        background-position: 0% 50%;
                    }
                }
        </style>
