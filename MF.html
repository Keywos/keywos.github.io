<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta charset="UTF-8">
	<title>Keymf</title>
	<style type="text/css">
		
		body {
			font: 16px/1.8 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC","Microsoft YaHei", Helvetica, Arial, sans-serif,"Apple Color Emoji", "Segoe UI Emoji";
			text-align: center;
			background-color: #000;
		}
		
		.box {
			width: 468px;
			height: 468px;
			/*边框*/
			/*border: 1px solid black;*/
			/*外边距  上下   左右*/
			margin: 200px auto;
			/*相对定位  调整位置的时候是根据自身位置调整位置*/
			/*position: relative;*/
			/*子绝父相   子元素绝对定位   父元素相对定位
				是这个模式的时候   调整子元素的位置会根据父元素边缘调整位置*/
			transform-style: preserve-3d;/*转3d试图*/
			transform: rotateX(-30deg) rotateY(-30deg);	/*旋转*/
			/*调用动画集  动画集名称 动画集执行之间 匀速 执行次数*/
			animation: move 10s linear infinite;
		}
/*		 linear infinite*/
		.box div {
			/*绝对定位  调整位置的时候是根据浏览器边框调整位置*/
			position: absolute;
			top: 0;
			left: 0;
		}
		/*span是行内元素  特点不能设置宽高*/
		.box div span {
			/*转换元素类型   块级元素特点，可以设置宽高 但是独占一行*/
			display: block;
			width: 148px;
			height: 148px;
			border: 4px solid #b8d9eebe;
			/*浮动*/
			float: left;
			/*圆角：*/
			border-radius: 14px;
		}
		.box .one{
			width: 468px;
			height: 468px;
			/*位移*/
			transform: translateZ(234px);
		}
		.box .two{
			width: 468px;
			height: 468px;
			/*位移*/
			transform: translateZ(-234px);
		}
		.box .three{
			width: 468px;
			height: 468px;
			transform: rotateY(90deg) translateZ(234px);
			
		}
		.box .four{
			width: 468px;
			height: 468px;
			transform: rotateY(90deg) translateZ(-234px);
		}
		.box .five{
			width: 468px;
			height: 468px;
			transform: rotateX(90deg) translateZ(234px);
		}
		.box .six{
			width: 468px;
			height: 468px;
			transform: rotateX(90deg) translateZ(-234px); 
		}
		/*封装动画*/
		@keyframes move{
			to {
				
			}
			from {
				transform: rotateX(330deg) rotateY(330deg);
			}
		}
	</style>
</head>
<body>
	<br>
	<h2 style="color:#b8d9ee43" align="center">Life</h2>
	<div class="box">
		<div class="one">
			<span></span>
